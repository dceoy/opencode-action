---
name: OpenCode GitHub Action
description: Run OpenCode in GitHub Actions workflows
branding:
  icon: square
  color: black
inputs:
  model:
    required: true
    description: Model to use, in provider/model format
  agent:
    required: false
    description: Agent to use. Must be a primary agent. Falls back to default_agent from config or 'build' if not found.
    default: build
  share:
    required: false
    description: Whether to share the opencode session
    default: 'false'
  prompt:
    required: false
    description: Custom prompt to override the default prompt
    default: ''
  use-github-token:
    required: false
    description: Whether to use GITHUB_TOKEN directly instead of OpenCode App token exchange. When true, skips OIDC and uses the GITHUB_TOKEN env var.
    default: 'false'
  mentions:
    required: false
    description: Comma-separated list of trigger phrases (case-insensitive)
    default: /opencode,/oc
  variant:
    required: false
    description: Model variant for provider-specific reasoning effort (e.g., high, max, minimal)
    default: ''
  oidc-base-url:
    required: false
    description: Base URL for OIDC token exchange API. Only required when running a custom GitHub App install.
    default: https://api.opencode.ai
  version:
    required: false
    description: OpenCode version to install (e.g., v1.2.3)
    default: latest
  enable-toolkit:
    required: false
    description: Install the action's bundled .opencode/ agents, commands, and skills into ~/.config/opencode (global config) before running. When review-only is also true, any pre-existing content at that path (and at ~/.opencode/ other than the cached bin/ directory) is replaced first so a stale or self-hosted-runner-persisted toolkit can never remain authoritative; otherwise pre-existing global config is preserved so mutation-capable workflows keep their persisted customizations on self-hosted runners.
    default: 'true'
  review-only:
    required: false
    description: Set true only for a dedicated review-only workflow entrypoint whose prompt always invokes /review-pr. Requires enable-toolkit true and agent to be the default ('build') or 'review-pr-orchestrator', and requires prompt to explicitly invoke /review-pr; the run fails fast otherwise. Combined with enable-toolkit, this also disables loading project-level .opencode/ config and AGENTS.md from the checked-out repository, so a pull request cannot shadow the bundled toolkit's trusted agents, commands, or permissions with its own, and installs the toolkit into a freshly wiped ~/.config/opencode/ so no pre-existing global config can shadow it either. Leave false for mutation-capable workflows (for example /oc ...), which need the repository's own .opencode/ config and AGENTS.md to keep working. review-only does not, by itself, disable OpenCode's own automatic branch commit/push in opencode github run; see README for the current limitation.
    default: 'false'
  timeout-minutes:
    required: false
    description: Maximum minutes to let 'opencode github run' execute before it is killed (uses 'timeout'/'gtimeout' when available; otherwise runs without an enforced timeout).
    default: '60'
outputs:
  opencode-version:
    description: OpenCode version resolved for this run.
    value: ${{ steps.version.outputs.opencode-version }}
  cache-hit:
    description: Whether the OpenCode binary cache was restored.
    value: ${{ steps.cache.outputs.cache-hit }}
runs:
  using: composite
  steps:
    - name: Validate review-only configuration
      if: inputs.review-only == 'true'
      shell: bash -euo pipefail {0}
      env:
        ENABLE_TOOLKIT: ${{ inputs.enable-toolkit }}
        AGENT: ${{ inputs.agent }}
        PROMPT: ${{ inputs.prompt }}
      run: |
        if [[ "${ENABLE_TOOLKIT}" != "true" ]]; then
          echo "::error::review-only requires enable-toolkit: true (the default). The read-only /review-pr entrypoint, its guard scripts, and its permission boundary are only installed when the bundled toolkit is enabled; without it, review-only has no read-only toolkit to enforce."
          exit 1
        fi
        if [[ "${AGENT}" != "build" && "${AGENT}" != "review-pr-orchestrator" ]]; then
          echo "::error::review-only requires agent to be the default ('build', which /review-pr's own command frontmatter routes to review-pr-orchestrator) or explicitly 'review-pr-orchestrator'. Got '${AGENT}'."
          exit 1
        fi
        if [[ ! "${PROMPT}" =~ ^/review-pr([[:space:]].*)?$ ]]; then
          echo "::error::review-only requires an explicit prompt that invokes /review-pr (for example prompt: /review-pr). A mention-triggered or unset prompt would run whatever a PR/issue comment supplies under the default agent, bypassing the read-only boundary entirely. Got prompt: '${PROMPT}'."
          exit 1
        fi
    - name: Get OpenCode version
      id: version
      shell: bash -euo pipefail {0}
      env:
        INPUT_VERSION: ${{ inputs.version }}
        GITHUB_TOKEN: ${{ github.token }}
      run: |
        if [[ "${INPUT_VERSION}" == "latest" ]]; then
          if [[ -n "${GITHUB_TOKEN:-}" ]]; then
            auth_header=(-H "Authorization: token ${GITHUB_TOKEN}")
          else
            auth_header=()
          fi
          OPENCODE_VERSION="$(curl -fsSL "${auth_header[@]}" https://api.github.com/repos/anomalyco/opencode/releases/latest | jq -r '.tag_name')"
        else
          OPENCODE_VERSION="${INPUT_VERSION}"
        fi
        echo "opencode-version=$(tr -d v <<< "${OPENCODE_VERSION}")" | tee -a "${GITHUB_OUTPUT}"
    - name: Cache OpenCode
      id: cache
      uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9  # v6.1.0
      with:
        path: ~/.opencode/bin
        key: opencode-${{ runner.os }}-${{ runner.arch }}-${{ steps.version.outputs.opencode-version }}
    - name: Install OpenCode
      if: >
        steps.cache.outputs.cache-hit != 'true'
      shell: bash -euo pipefail {0}
      env:
        OPENCODE_VERSION: ${{ steps.version.outputs.opencode-version }}
      run: >
        curl -fsSL https://opencode.ai/install | bash -s -- --version "${OPENCODE_VERSION}"
    - name: Add OpenCode to PATH
      shell: bash -euo pipefail {0}
      run: >  # zizmor: ignore[github-env] fixed path, not attacker-controlled
        echo "${HOME}/.opencode/bin" | tee -a "${GITHUB_PATH}"
    - name: Copy bundled OpenCode config
      if: inputs.enable-toolkit == 'true'
      shell: bash -euo pipefail {0}
      env:
        ACTION_PATH: ${{ github.action_path }}
        REVIEW_ONLY: ${{ inputs.review-only }}
      run: |
        mkdir -p "${HOME}/.config/opencode"
        if [[ "${REVIEW_ONLY}" == "true" ]]; then
          rm -rf "${HOME}/.config/opencode"
          mkdir -p "${HOME}/.config/opencode"
          cp -r "${ACTION_PATH}/.opencode/." "${HOME}/.config/opencode/"
          if [[ -d "${HOME}/.opencode" ]]; then
            find "${HOME}/.opencode" -mindepth 1 -maxdepth 1 ! -name bin -exec rm -rf {} +
          fi
          echo "review-only: installed the bundled OpenCode config into a fresh ~/.config/opencode/ and cleared any other pre-existing ~/.opencode/ content, since review-only's trust boundary requires no pre-existing global config to survive"
        else
          cp -rn "${ACTION_PATH}/.opencode/." "${HOME}/.config/opencode/"
          echo "Installed the bundled OpenCode config into ~/.config/opencode/, preserving pre-existing files (not review-only, so no destructive reset of persisted global config)"
        fi
    - name: Run OpenCode
      id: run_opencode
      shell: bash -euo pipefail {0}
      env:
        MODEL: ${{ inputs.model }}
        AGENT: ${{ inputs.agent }}
        SHARE: ${{ inputs.share }}
        PROMPT: ${{ inputs.prompt }}
        USE_GITHUB_TOKEN: ${{ inputs.use-github-token }}
        MENTIONS: ${{ inputs.mentions }}
        VARIANT: ${{ inputs.variant }}
        OIDC_BASE_URL: ${{ inputs.oidc-base-url }}
        TIMEOUT_MINUTES: ${{ inputs.timeout-minutes }}
        OPENCODE_DISABLE_PROJECT_CONFIG: ${{ inputs.enable-toolkit == 'true' && inputs.review-only == 'true' && '1' || '' }}
      run: |
        output_file="$(mktemp)"
        trap 'rm -f "${output_file}"' EXIT
        timeout_cmd=()
        if command -v timeout >/dev/null 2>&1; then
          timeout_cmd=(timeout "${TIMEOUT_MINUTES}m")
        elif command -v gtimeout >/dev/null 2>&1; then
          timeout_cmd=(gtimeout "${TIMEOUT_MINUTES}m")
        else
          echo "::warning::No timeout command found (timeout/gtimeout); running OpenCode without an enforced timeout."
        fi
        set +e
        "${timeout_cmd[@]}" opencode github run 2>&1 | tee "${output_file}"
        opencode_status="${PIPESTATUS[0]}"
        set -e

        if [[ "${opencode_status}" -ne 0 ]]; then
          if [[ "${opencode_status}" -eq 124 ]]; then
            echo "::error::OpenCode timed out after ${TIMEOUT_MINUTES} minutes for model '${MODEL:-unknown}'."
          elif grep -Eiq 'AI_APICallError|Insufficient credits|statusCode:[[:space:]]*402|"code":[[:space:]]*402' "${output_file}"; then
            echo "::error::OpenCode failed with a model provider API error for model '${MODEL:-unknown}'. Check provider credentials, quota, and billing."
          else
            echo "::error::OpenCode failed with exit code ${opencode_status} for model '${MODEL:-unknown}'."
          fi
          exit "${opencode_status}"
        fi
