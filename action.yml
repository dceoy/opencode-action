---
name: OpenCode GitHub Action
description: Run OpenCode in GitHub Actions workflows
branding:
  icon: square
  color: black
inputs:
  model:
    required: true
    description: Model to use, in provider/model format
  agent:
    required: false
    description: Agent to use as the run's default_agent. A slash command's frontmatter agent takes precedence.
    default: build
  share:
    required: false
    description: Whether to share the opencode session
    default: 'false'
  prompt:
    required: false
    description: Custom prompt to override the default prompt. Leading Markdown slash commands are expanded before opencode github run.
    default: ''
  use-github-token:
    required: false
    description: Whether to use GITHUB_TOKEN directly instead of OpenCode App token exchange. When true, skips OIDC and uses the GITHUB_TOKEN env var.
    default: 'false'
  mentions:
    required: false
    description: Comma-separated list of trigger phrases (case-insensitive)
    default: /opencode,/oc
  variant:
    required: false
    description: Model variant for provider-specific reasoning effort (e.g., high, max, minimal)
    default: ''
  oidc-base-url:
    required: false
    description: Base URL for OIDC token exchange API. Only required when running a custom GitHub App install.
    default: https://api.opencode.ai
  version:
    required: false
    description: OpenCode version to install (e.g., v1.2.3)
    default: latest
  enable-toolkit:
    required: false
    description: Install the action's bundled .opencode/ agents, commands, and skills into ~/.config/opencode (global config) before running. Existing files are preserved.
    default: 'true'
  timeout-minutes:
    required: false
    description: Maximum minutes to let 'opencode github run' execute before it is killed (uses 'timeout'/'gtimeout' when available; otherwise runs without an enforced timeout).
    default: '60'
outputs:
  opencode-version:
    description: OpenCode version resolved for this run.
    value: ${{ steps.version.outputs.opencode-version }}
  cache-hit:
    description: Whether the OpenCode binary cache was restored.
    value: ${{ steps.cache.outputs.cache-hit }}
runs:
  using: composite
  steps:
    - name: Get OpenCode version
      id: version
      shell: bash -euo pipefail {0}
      env:
        INPUT_VERSION: ${{ inputs.version }}
        GITHUB_TOKEN: ${{ github.token }}
      run: |
        if [[ "${INPUT_VERSION}" == "latest" ]]; then
          if [[ -n "${GITHUB_TOKEN:-}" ]]; then
            auth_header=(-H "Authorization: token ${GITHUB_TOKEN}")
          else
            auth_header=()
          fi
          OPENCODE_VERSION="$(curl -fsSL "${auth_header[@]}" https://api.github.com/repos/anomalyco/opencode/releases/latest | jq -r '.tag_name')"
        else
          OPENCODE_VERSION="${INPUT_VERSION}"
        fi
        echo "opencode-version=$(tr -d v <<< "${OPENCODE_VERSION}")" | tee -a "${GITHUB_OUTPUT}"
    - name: Cache OpenCode
      id: cache
      uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9  # v6.1.0
      with:
        path: ~/.opencode/bin
        key: opencode-${{ runner.os }}-${{ runner.arch }}-${{ steps.version.outputs.opencode-version }}
    - name: Install OpenCode
      if: >
        steps.cache.outputs.cache-hit != 'true'
      shell: bash -euo pipefail {0}
      env:
        OPENCODE_VERSION: ${{ steps.version.outputs.opencode-version }}
      run: >
        curl -fsSL https://opencode.ai/install | bash -s -- --version "${OPENCODE_VERSION}"
    - name: Add OpenCode to PATH
      shell: bash -euo pipefail {0}
      run: >  # zizmor: ignore[github-env] fixed path, not attacker-controlled
        echo "${HOME}/.opencode/bin" | tee -a "${GITHUB_PATH}"
    - name: Detect review-only mode
      id: review_mode
      shell: bash -euo pipefail {0}
      env:
        PROMPT: ${{ inputs.prompt }}
        MENTIONS: ${{ inputs.mentions }}
        ENABLE_TOOLKIT: ${{ inputs.enable-toolkit }}
        OPENCODE_VERSION: ${{ steps.version.outputs.opencode-version }}
        ACTION_PATH: ${{ github.action_path }}
      run: |
        # shellcheck source=scripts/expand-command.sh
        source "${ACTION_PATH}/scripts/expand-command.sh"
        opencode_effective_prompt "${PROMPT}" "${MENTIONS}" "${GITHUB_EVENT_PATH:-}"
        review_only=false
        first_line="${OPENCODE_EFFECTIVE_PROMPT%%$'\n'*}"
        if [[ "${first_line}" =~ ^/review-pr([[:space:]].*)?$ ]]; then
          review_only=true
        fi
        if [[ "${review_only}" == "true" ]]; then
          [[ "${ENABLE_TOOLKIT}" == "true" ]] || {
            echo "::error::Review-only mode requires enable-toolkit: true."
            exit 1
          }
          version="${OPENCODE_VERSION#v}"
          [[ "${version}" =~ ^[0-9]+\.[0-9]+\.[0-9]+([.-].*)?$ ]] || {
            echo "::error::Review-only mode requires a semantic OpenCode version at or above 1.2.14 (got '${OPENCODE_VERSION}')."
            exit 1
          }
          IFS=. read -r major minor patch_and_suffix <<<"${version}"
          patch="${patch_and_suffix%%[-.]*}"
          suffix="${version#"${major}.${minor}.${patch}"}"
          if (( 10#${major} < 1 || (10#${major} == 1 && 10#${minor} < 2) || (10#${major} == 1 && 10#${minor} == 2 && 10#${patch} < 14) )) ||
            [[ "${major}.${minor}.${patch}" == "1.2.14" && -n "${suffix}" ]]; then
            echo "::error::Review-only mode requires OpenCode 1.2.14 or newer (got '${OPENCODE_VERSION}')."
            exit 1
          fi
        fi
        echo "enabled=${review_only}" >> "${GITHUB_OUTPUT}"
    - name: Copy bundled OpenCode config
      if: inputs.enable-toolkit == 'true'
      shell: bash -euo pipefail {0}
      env:
        ACTION_PATH: ${{ github.action_path }}
        REVIEW_ONLY: ${{ steps.review_mode.outputs.enabled }}
      run: |
        if [[ "${REVIEW_ONLY}" == "true" ]]; then
          export XDG_CONFIG_HOME="${HOME}/.config"
          rm -rf "${HOME}/.config/opencode"
          mkdir -p "${HOME}/.config/opencode"
          cp -r "${ACTION_PATH}/.opencode/." "${HOME}/.config/opencode/"
          if [[ -d "${HOME}/.opencode" ]]; then
            # Remove inherited plugins, agents, and config that could affect the isolated review run.
            find "${HOME}/.opencode" -mindepth 1 -maxdepth 1 ! -name bin -exec rm -rf {} +
          fi
          echo "Installed fresh review-only OpenCode config"
        else
          mkdir -p "${HOME}/.config/opencode"
          cp -rn "${ACTION_PATH}/.opencode/." "${HOME}/.config/opencode/"
          helper_dir="${HOME}/.config/opencode/scripts/opencode-action"
          rm -rf "${helper_dir}"
          mkdir -p "${helper_dir}"
          cp -f "${ACTION_PATH}/.opencode/scripts/resolve-app-token.sh" \
            "${ACTION_PATH}/.opencode/scripts/review-pr-submit.sh" \
            "${helper_dir}/"
          echo "Copied bundled OpenCode config into ~/.config/opencode/"
        fi
    - name: Run OpenCode
      id: run_opencode
      shell: bash -euo pipefail {0}
      env:
        MODEL: ${{ inputs.model }}
        AGENT: ${{ inputs.agent }}
        SHARE: ${{ inputs.share }}
        PROMPT: ${{ inputs.prompt }}
        USE_GITHUB_TOKEN: ${{ inputs.use-github-token }}
        MENTIONS: ${{ inputs.mentions }}
        VARIANT: ${{ inputs.variant }}
        OIDC_BASE_URL: ${{ inputs.oidc-base-url }}
        TIMEOUT_MINUTES: ${{ inputs.timeout-minutes }}
        ACTION_PATH: ${{ github.action_path }}
        ENABLE_TOOLKIT: ${{ inputs.enable-toolkit }}
        REVIEW_ONLY: ${{ steps.review_mode.outputs.enabled }}
      run: |
        if [[ "${REVIEW_ONLY}" == "true" ]]; then
          export XDG_CONFIG_HOME="${HOME}/.config"
          export OPENCODE_DISABLE_PROJECT_CONFIG=1
          # Composite steps inherit caller env. Remove every explicit config
          # override before constructing the action's trusted inline config.
          unset OPENCODE_CONFIG OPENCODE_CONFIG_DIR OPENCODE_CONFIG_CONTENT
        fi
        # `opencode github run` sends PROMPT verbatim and does not forward the
        # action's agent input. Resolve Markdown slash commands and apply the
        # effective primary agent through the final inline config layer.
        # shellcheck source=scripts/expand-command.sh
        source "${ACTION_PATH}/scripts/expand-command.sh"
        opencode_effective_prompt "${PROMPT}" "${MENTIONS}" "${GITHUB_EVENT_PATH:-}"
        if [[ "${REVIEW_ONLY}" == "true" ]]; then
          command_dirs=("${ACTION_PATH}/.opencode/commands")
        else
          command_dirs=(
            "${GITHUB_WORKSPACE:-${PWD}}/.opencode/commands"
            "${HOME}/.config/opencode/commands"
          )
        fi
        if [[ "${ENABLE_TOOLKIT}" == "true" && "${REVIEW_ONLY}" != "true" ]]; then
          command_dirs+=("${ACTION_PATH}/.opencode/commands")
        fi
        opencode_resolve_prompt_and_agent \
          "${OPENCODE_EFFECTIVE_PROMPT}" "${AGENT}" "${command_dirs[@]}"
        if [[ -n "${PROMPT}" || -n "${OPENCODE_RESOLVED_COMMAND_FILE}" ]]; then
          export PROMPT="${OPENCODE_RESOLVED_PROMPT}"
        fi

        if [[ -n "${OPENCODE_RESOLVED_AGENT}" ]]; then
          base_config="{}"
          if [[ -n "${OPENCODE_CONFIG_CONTENT:-}" ]]; then
            base_config="$(opencode_jsonc_to_json <<< "${OPENCODE_CONFIG_CONTENT}")"
          fi
          OPENCODE_CONFIG_CONTENT="$(jq -nc \
            --arg agent "${OPENCODE_RESOLVED_AGENT}" \
            --argjson base "${base_config}" \
            '$base * {default_agent: $agent}')"
          export OPENCODE_CONFIG_CONTENT
        fi

        output_file="$(mktemp)"
        trap 'rm -f "${output_file}"' EXIT
        timeout_cmd=()
        if command -v timeout >/dev/null 2>&1; then
          timeout_cmd=(timeout "${TIMEOUT_MINUTES}m")
        elif command -v gtimeout >/dev/null 2>&1; then
          timeout_cmd=(gtimeout "${TIMEOUT_MINUTES}m")
        else
          echo "::warning::No timeout command found (timeout/gtimeout); running OpenCode without an enforced timeout."
        fi
        set +e
        "${timeout_cmd[@]}" opencode github run 2>&1 | tee "${output_file}"
        opencode_status="${PIPESTATUS[0]}"
        set -e

        if [[ "${opencode_status}" -ne 0 ]]; then
          if [[ "${opencode_status}" -eq 124 ]]; then
            echo "::error::OpenCode timed out after ${TIMEOUT_MINUTES} minutes for model '${MODEL:-unknown}'."
          elif grep -Eiq 'AI_APICallError|Insufficient credits|statusCode:[[:space:]]*402|"code":[[:space:]]*402' "${output_file}"; then
            echo "::error::OpenCode failed with a model provider API error for model '${MODEL:-unknown}'. Check provider credentials, quota, and billing."
          else
            echo "::error::OpenCode failed with exit code ${opencode_status} for model '${MODEL:-unknown}'."
          fi
          exit "${opencode_status}"
        fi
