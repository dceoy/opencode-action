---
name: CI/CD
on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  release:
    types:
      - released
  workflow_dispatch:
permissions:
  contents: read
jobs:
  github-actions-lint-and-scan:
    if: >
      github.event_name == 'push'
      || github.event_name == 'pull_request'
      || github.event_name == 'workflow_dispatch'
    permissions:
      contents: read
      actions: read
      security-events: write
    uses: dceoy/gh-actions-for-devops/.github/workflows/github-actions-lint-and-scan.yml@main   # zizmor: ignore[unpinned-uses]
    with:
      search-path: .github/workflows
      use-yamllint: false
  yaml-lint:
    if: >
      github.event_name == 'push'
      || github.event_name == 'pull_request'
      || github.event_name == 'workflow_dispatch'
    permissions:
      contents: read
    uses: dceoy/gh-actions-for-devops/.github/workflows/yaml-lint.yml@main  # zizmor: ignore[unpinned-uses]
    with:
      search-path: .
      yamllint-config-data: '{"extends": "relaxed", "rules": {"line-length": "disable"}}'
  github-major-version-tag:
    if: >
      (github.event_name == 'release' && github.event.action == 'released')
      || github.event_name == 'workflow_dispatch'
    permissions:
      contents: write
    uses: dceoy/gh-actions-for-devops/.github/workflows/github-major-version-tag.yml@main  # zizmor: ignore[unpinned-uses]
  repo-qa:
    if: >
      github.event_name == 'push'
      || github.event_name == 'pull_request'
      || github.event_name == 'workflow_dispatch'
    permissions:
      contents: read
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0
        with:
          persist-credentials: false
      - name: Validate OpenCode agent frontmatter and review-pr references
        run: ./.agents/skills/local-qa/scripts/validate-opencode.sh
      - name: Shellcheck repository scripts
        run: git ls-files -z -- '*.sh' '*.bash' '*.bats' | xargs -0 shellcheck
      - name: Scan action.yml with zizmor
        run: pipx run zizmor action.yml
  dependabot-auto-merge:
    if: >
      github.event_name == 'pull_request' && github.event.pull_request.user.login == 'dependabot[bot]'
    needs:
      - github-actions-lint-and-scan
      - repo-qa
    permissions:
      contents: write
      pull-requests: write
      actions: read
      checks: read
      statuses: read
    uses: dceoy/gh-actions-for-devops/.github/workflows/dependabot-auto-merge.yml@main  # zizmor: ignore[unpinned-uses]
    with:
      unconditional: true
