---
name: CI/CD
on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  release:
    types:
      - released
  workflow_dispatch:
permissions:
  contents: read
defaults:
  run:
    shell: bash -euo pipefail {0}
    working-directory: .
jobs:
  local-test:
    if: >
      github.event_name == 'push'
      || github.event_name == 'pull_request'
      || github.event_name == 'workflow_dispatch'
    permissions:
      contents: read
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0
        with:
          persist-credentials: false
      - name: Validate action metadata
        run: |
          test -f action.yml
          grep -q '^runs:' action.yml
          grep -q 'using: "composite"' action.yml
          grep -q 'opencode github run' action.yml
      - name: Validate documentation
        run: |
          test -f README.md
          grep -q 'dceoy/opencode-action@main' README.md
          grep -q 'model:' README.md
  github-actions-lint-and-scan:
    if: >
      github.event_name == 'push'
      || github.event_name == 'pull_request'
      || github.event_name == 'workflow_dispatch'
    permissions:
      contents: read
      actions: read
      security-events: write
    uses: dceoy/gh-actions-for-devops/.github/workflows/github-actions-lint-and-scan.yml@main   # zizmor: ignore[unpinned-uses]
    with:
      search-path: .github/workflows
      go-version: stable
      python-version: 3.x
  published-version-test:
    if: >
      (github.event_name == 'pull_request' && github.event.pull_request.user.login == 'dependabot[bot]')
      || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0
        with:
          persist-credentials: false
      - name: Validate published action reference
        run: |
          grep -q 'uses: dceoy/opencode-action@main' README.md
  github-major-version-tag:
    if: >
      (github.event_name == 'release' && github.event.action == 'released')
      || github.event_name == 'workflow_dispatch'
    permissions:
      contents: write
    uses: dceoy/gh-actions-for-devops/.github/workflows/github-major-version-tag.yml@main  # zizmor: ignore[unpinned-uses]
  dependabot-auto-merge:
    if: >
      github.event_name == 'pull_request' && github.event.pull_request.user.login == 'dependabot[bot]'
    needs:
      - local-test
      - published-version-test
      - github-actions-lint-and-scan
    permissions:
      contents: write
      pull-requests: write
      actions: read
      checks: read
      statuses: read
    uses: dceoy/gh-actions-for-devops/.github/workflows/dependabot-auto-merge.yml@main  # zizmor: ignore[unpinned-uses]
    with:
      unconditional: true
