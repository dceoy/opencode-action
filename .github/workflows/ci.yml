---
name: CI/CD
on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  release:
    types:
      - released
  workflow_dispatch:
permissions:
  contents: read
defaults:
  run:
    shell: bash -euo pipefail {0}
    working-directory: .
jobs:
  github-actions-lint-and-scan:
    if: >
      github.event_name == 'push'
      || github.event_name == 'pull_request'
      || github.event_name == 'workflow_dispatch'
    permissions:
      contents: read
      actions: read
      security-events: write
    uses: dceoy/gh-actions-for-devops/.github/workflows/github-actions-lint-and-scan.yml@main   # zizmor: ignore[unpinned-uses]
    with:
      search-path: .github/workflows
      yamllint-search-path: .
      zizmor-search-path: .
  shell-lint:
    if: >
      github.event_name == 'push'
      || github.event_name == 'pull_request'
      || github.event_name == 'workflow_dispatch'
    permissions:
      contents: read
    uses: dceoy/gh-actions-for-devops/.github/workflows/shell-lint.yml@main  # zizmor: ignore[unpinned-uses]
    with:
      search-path: .
  bats-test:
    if: >
      github.event_name == 'push'
      || github.event_name == 'pull_request'
      || github.event_name == 'workflow_dispatch'
    permissions:
      contents: read
    uses: dceoy/gh-actions-for-devops/.github/workflows/bats-test.yml@main  # zizmor: ignore[unpinned-uses]
    with:
      search-path: .
      setup-run: |
        curl -fsSL https://opencode.ai/install | bash -s -- --version 1.2.14
        echo "${HOME}/.opencode/bin" >> "${GITHUB_PATH}"
  github-codeql-analysis:
    if: >
      github.event_name == 'push'
      || github.event_name == 'pull_request'
      || github.event_name == 'workflow_dispatch'
    permissions:
      contents: read
      security-events: write
      actions: read
    uses: dceoy/gh-actions-for-devops/.github/workflows/github-codeql-analysis.yml@main  # zizmor: ignore[unpinned-uses]
    with:
      language: >
        ["actions"]
  github-major-version-tag:
    if: >
      (github.event_name == 'release' && github.event.action == 'released')
      || github.event_name == 'workflow_dispatch'
    permissions:
      contents: write
    uses: dceoy/gh-actions-for-devops/.github/workflows/github-major-version-tag.yml@main  # zizmor: ignore[unpinned-uses]
  dependabot-auto-merge:
    if: >
      github.event_name == 'pull_request' && github.event.pull_request.user.login == 'dependabot[bot]'
    needs:
      - github-actions-lint-and-scan
      - shell-lint
      - bats-test
      - github-codeql-analysis
    permissions:
      contents: write
      pull-requests: write
      actions: read
      checks: read
      statuses: read
    uses: dceoy/gh-actions-for-devops/.github/workflows/dependabot-auto-merge.yml@main  # zizmor: ignore[unpinned-uses]
    with:
      unconditional: true
